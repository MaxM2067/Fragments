<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fragments</title>

    <!-- App Icon & PWA -->
    <link rel="icon" type="image/png" href="/icon-512.png">
    <link rel="apple-touch-icon" href="/icon-512.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6366F1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Fragments">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Comfortaa:wght@300..700&family=Quicksand:wght@300..700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: var(--font-family-main);
            background-color: #FBFCFE;
            color: #1E293B;
            -webkit-tap-highlight-color: transparent;
        }

        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Custom scrollbar for a softer look */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #E5E1DA;
            border-radius: 10px;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes bounce-subtle {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-3px);
            }
        }

        .animate-bounce-subtle {
            animation: bounce-subtle 2s infinite ease-in-out;
        }

        @keyframes glow {

            0%,
            100% {
                box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
            }

            50% {
                box-shadow: 0 0 30px rgba(99, 102, 241, 0.4);
            }
        }

        .animate-glow {
            animation: glow 3s infinite ease-in-out;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
